<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Estilo Copa</title>

<style>
:root{
    --bg1:#72d0d5;
    --bg2:#52b88b;
    --green:#56b346;
    --yellow:#f2d84d;
    --white:#ffffff;
}

body{
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    position:relative;
    width:500px;
    height:760px;
    overflow:hidden;
    border-radius:8px;

    background:linear-gradient(
        180deg,
        var(--bg1) 0%,
        #66cfc7 35%,
        var(--bg2) 100%
    );
}

/* Número 25 ao fundo */
.big-number{
    position:absolute;
    inset:0;
    font-size:500px;
    font-weight:900;
    line-height:0.75;
    color:var(--green);
    opacity:.95;
    pointer-events:none;
    user-select:none;
}

.big-number span{
    position:absolute;
}

.big-number .two{
    left:20px;
    top:10px;
}

.big-number .five{
    right:-50px;
    top:170px;
}

/* detalhe amarelo */
.accent{
    position:absolute;
    width:90px;
    height:90px;
    background:var(--yellow);
    top:190px;
    left:285px;
}

/* área da foto */
.player-image{
    position:absolute;
    left:50%;
    top:70px;
    transform:translateX(-50%);
    width:340px;
    height:500px;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,.15),
            rgba(255,255,255,.05)
        );

    border-radius:12px;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:22px;
    backdrop-filter:blur(2px);
}

.player-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* FIFA */
.fifa{
    position:absolute;
    top:20px;
    right:20px;

    width:90px;
    height:150px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    color:white;
    font-weight:900;
}

.fifa .shape{
    font-size:120px;
    line-height:.8;
}

.fifa .text{
    margin-top:-10px;
    font-size:26px;
}

/* faixa BRASIL */
.country-side{
    position:absolute;
    right:10px;
    bottom:110px;

    writing-mode:vertical-rl;
    text-orientation:mixed;

    color:white;
    font-size:60px;
    font-weight:900;
    letter-spacing:4px;
}

/* bandeira */
.flag{
    position:absolute;
    right:18px;
    bottom:250px;

    width:70px;
    height:70px;

    border-radius:50%;
    background:#009739;

    display:flex;
    align-items:center;
    justify-content:center;
    border:4px solid rgba(255,255,255,.8);
}

.flag::before{
    content:"";
    width:40px;
    height:40px;
    background:#ffdf00;
    transform:rotate(45deg);
    position:absolute;
}

.flag::after{
    content:"";
    width:24px;
    height:24px;
    background:#002776;
    border-radius:50%;
    position:absolute;
}

/* quadro amarelo */
.panini{
    position:absolute;
    right:15px;
    bottom:20px;

    width:135px;
    height:45px;

    background:#f6df3c;
    border-radius:4px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-weight:900;
    color:#b52b1e;
    letter-spacing:2px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}
</style>
</head>
<body>

<div class="card">

    <div class="big-number">
        <span class="two">2</span>
        <span class="five">5</span>
    </div>

    <div class="accent"></div>

    <div class="player-image">
        FOTO DO JOGADOR
    </div>

    <div class="fifa">
        <div class="shape">26</div>
        <div class="text">FIFA</div>
    </div>

    <div class="flag"></div>

    <div class="country-side">
        BRASIL
    </div>

    <div class="panini">
        PANINI
    </div>

</div>

</body>
</html>
